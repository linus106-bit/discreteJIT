seed: 42

vocab:
  base_vocab_size: 8

model:
  max_seq_len: 140
  d_model: 128
  n_layers: 4
  n_heads: 4
  dropout: 0.1

data:
  train:
    num_samples: 12000
    min_length: 32
    max_length: 64
    fixed_p: 0.1
    pattern_types: [repeating_motif, mirrored_motif, arithmetic_walk, interleaved_motifs]
  val:
    num_samples: 2000
    min_length: 32
    max_length: 64
    fixed_p: 0.1
    pattern_types: [repeating_motif, mirrored_motif, arithmetic_walk, interleaved_motifs]
  eval:
    num_samples: 2000
    min_length: 32
    max_length: 64
    fixed_p: 0.1
    pattern_types: [repeating_motif, mirrored_motif, arithmetic_walk, interleaved_motifs]

training:
  epochs: 8
  batch_size: 64
  eval_batch_size: 128
  lr: 0.0005
  weight_decay: 0.01
  use_gpu: true
