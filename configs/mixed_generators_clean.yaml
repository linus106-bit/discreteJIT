seed: 42

vocab:
  base_vocab_size: 8
  add_noise_tokens: false
  noise_bins: 11

model:
  max_seq_len: 140
  d_model: 128
  n_layers: 4
  n_heads: 4
  dropout: 0.1

objective:
  name: clean_prediction

data:
  generators: [repeating_motif, arithmetic_mod, block_constant]
  generator_weights: [0.4, 0.3, 0.3]
  train:
    num_samples: 15000
    min_length: 32
    max_length: 64
    fixed_p: null
    sampled_p: true
    sampled_p_min: 0.0
    sampled_p_max: 0.5
    use_noise_level_token: false
  val:
    num_samples: 2500
    min_length: 32
    max_length: 64
    fixed_p: null
    sampled_p: true
    sampled_p_min: 0.0
    sampled_p_max: 0.5
    use_noise_level_token: false
  eval:
    num_samples: 2500
    min_length: 32
    max_length: 64
    fixed_p: null
    sampled_p: true
    sampled_p_min: 0.0
    sampled_p_max: 0.5
    use_noise_level_token: false

training:
  epochs: 10
  batch_size: 64
  eval_batch_size: 128
  lr: 0.0005
  weight_decay: 0.01
  use_gpu: true

evaluation:
  lengths: [32, 64, 96, 128]
